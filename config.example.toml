[library]
root = "/Users/you/PaperLibrary"

[paths]
inbox = "inbox"
papers = "papers"
records = "records"
text = "text"
db = "db/library.db"
logs = "logs"
failed = "failed"
duplicates = "duplicates"

[pipeline]
move_after_ingest = true
skip_existing     = true
dry_run_default   = false

[extraction]
engine         = "pdfplumber"
min_char_count = 500
min_word_count = 100

[ai]
enabled     = true
provider    = "anthropic"
model       = "claude-sonnet-4-20250514"
max_tokens  = 1200
temperature = 0.2